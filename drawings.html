<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Drawings Project - Full Gallery | Violetta Portfolio</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      padding: 0;
      background: #0f172a;
      color: #e5e7eb;
    }
    .wrapper {
      max-width: 1200px;
      margin: 0 auto;
      padding: 32px 16px;
    }
    header {
      text-align: center;
      margin-bottom: 32px;
    }
    h1 {
      font-size: 2.2rem;
      color: #f9fafb;
      margin: 0 0 8px;
    }
    nav {
      margin-bottom: 24px;
    }
    nav a {
      display: inline-block;
      color: #38bdf8;
      text-decoration: none;
      font-weight: 500;
      padding: 8px 16px;
      background: rgba(56, 189, 248, 0.1);
      border: 1px solid rgba(56, 189, 248, 0.3);
      border-radius: 6px;
      margin: 0 4px;
    }
    nav a:hover {
      background: rgba(56, 189, 248, 0.2);
      border-color: #38bdf8;
    }
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .gallery-item {
      background: #020617;
      border-radius: 12px;
      padding: 12px;
      box-shadow: 0 12px 30px rgba(15, 23, 42, 0.7);
      border: 1px solid rgba(148, 163, 184, 0.25);
      transition: all 0.2s ease;
    }
    .gallery-item:hover {
      transform: translateY(-4px);
      box-shadow: 0 18px 40px rgba(15, 23, 42, 0.9);
      border-color: #38bdf8;
    }
    .gallery-item img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      border-radius: 8px;
    }
    @media (max-width: 600px) {
      .wrapper { padding: 24px 16px; }
      h1 { font-size: 1.8rem; }
      .gallery { grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); }
    }
  </style>
</head>
