<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Drawings Project - Full Gallery | Violetta Portfolio</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      padding: 0;
      background: #0f172a;
      color: #e5e7eb;
    }
    .wrapper {
      max-width: 1200px;
      margin: 0 auto;
      padding: 32px 16px;
    }
    header {
      text-align: center;
      margin-bottom: 32px;
    }
    h1 {
      font-size: 2.2rem;
      color: #f9fafb;
      margin: 0 0 8px;
    }
    nav {
      margin-bottom: 24px;
    }
    nav a {
      display: inline-block;
      color: #38bdf8;
      text-decoration: none;
      font-weight: 500;
      padding: 8px 16px;
      background: rgba(56, 189, 248, 0.1);
      border: 1px solid rgba(56, 189, 248, 0.3);
      border-radius: 6px;
      margin: 0 4px;
    }
    nav a:hover {
      background: rgba(56, 189, 248, 0.2);
      border-color: #38bdf8;
    }
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .gallery-item {
      background: #020617;
      border-radius: 12px;
      padding: 12px;
      box-shadow: 0 12px 30px rgba(15, 23, 42, 0.7);
      border: 1px solid rgba(148, 163, 184, 0.25);
      transition: all 0.2s ease;
      cursor: pointer;
    }
    .gallery-item:hover {
      transform: translateY(-4px);
      box-shadow: 0 18px 40px rgba(15, 23, 42, 0.9);
      border-color: #38bdf8;
    }
    .gallery-item img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      border-radius: 8px;
    }

    /* Lightbox styles */
    .lightbox {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.85);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }
    .lightbox img {
      max-width: 90vw;
      max-height: 90vh;
      border-radius: 8px;
    }
    .lightbox-close {
      position: fixed;
      top: 16px;
      right: 20px;
      font-size: 2rem;
      color: #fff;
      cursor: pointer;
      user-select: none;
    }

    @media (max-width: 600px) {
      .wrapper { padding: 24px 16px; }
      h1 { font-size: 1.8rem; }
      .gallery { grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); }
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <header>
      <h1>🎨 Drawings Project - Full Gallery</h1>
      <nav>
        <a href="index.html">← Back to Portfolio</a>
      </nav>
    </header>
    
    <ul class="gallery">
      <!-- All drawing images in order -->
      <li class="gallery-item"><img src="https://raw.githubusercontent.com/Myrpin/My-page/main/IMG-20260307-WA0002(1).jpg" alt="Drawing 1"></li>
      <li class="gallery-item"><img src="https://raw.githubusercontent.com/Myrpin/My-page/main/IMG-20260307-WA0006.jpg" alt="Drawing 2"></li>
      <li class="gallery-item"><img src="https://raw.githubusercontent.com/Myrpin/My-page/main/IMG-20260307-WA0008.jpg" alt="Drawing 3"></li>
      <li class="gallery-item"><img src="https://raw.githubusercontent.com/Myrpin/My-page/main/IMG-20260307-WA0009.jpg" alt="Drawing 4"></li>
      <li class="gallery-item"><img src="https://raw.githubusercontent.com/Myrpin/My-page/main/IMG-20260307-WA0010.jpg" alt="Drawing 5"></li>
      <li class="gallery-item"><img src="https://raw.githubusercontent.com/Myrpin/My-page/main/IMG-20260307-WA0011.jpg" alt="Drawing 6"></li>
      <li class="gallery-item"><img src="https://raw.githubusercontent.com/Myrpin/My-page/main/IMG-20260307-WA0012.jpg" alt="Drawing 7"></li>
      <li class="gallery-item"><img src="https://raw.githubusercontent.com/Myrpin/My-page/main/IMG-20260307-WA0014.jpg" alt="Drawing 8"></li>
      <li class="gallery-item"><img src="https://raw.githubusercontent.com/Myrpin/My-page/main/IMG-20260307-WA0015.jpg" alt="Drawing 9"></li>
      <li class="gallery-item"><img src="https://raw.githubusercontent.com/Myrpin/My-page/main/IMG-20260307-WA0016.jpg" alt="Drawing 10"></li>
      <li class="gallery-item"><img src="https://raw.githubusercontent.com/Myrpin/My-page/main/IMG-20260307WA0017.jpg" alt="Drawing 11"></li>
      <li class="gallery-item"><img src="https://raw.githubusercontent.com/Myrpin/My-page/main/IMG-20260307-WA0018.jpg" alt="Drawing 12"></li>
      <li class="gallery-item"><img src="https://raw.githubusercontent.com/Myrpin/My-page/main/IMG-20260307-WA0019.jpg" alt="Drawing 13"></li>
      <li class="gallery-item"><img src="https://raw.githubusercontent.com/Myrpin/My-page/main/IMG-20260307-WA0020.jpg" alt="Drawing 14"></li>
      <li class="gallery-item"><img src="https://raw.githubusercontent.com/Myrpin/My-page/main/IMG-20260307-WA0021.jpg" alt="Drawing 15"></li>
    </ul>
  </div>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox">
    <span class="lightbox-close" id="lightbox-close">&times;</span>
    <img id="lightbox-img" src="" alt="">
  </div>

  <script>
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightbox-img');
    const lightboxClose = document.getElementById('lightbox-close');

    document.addEventListener('click', function (e) {
      const target = e.target;
      if (target.tagName === 'IMG' && target.closest('.gallery')) {
        lightboxImg.src = target.src;
        lightboxImg.alt = target.alt;
        lightbox.style.display = 'flex';
      }
    });

    lightboxClose.addEventListener('click', () => {
      lightbox.style.display = 'none';
    });

    lightbox.addEventListener('click', (e) => {
      if (e.target === lightbox) {
        lightbox.style.display = 'none';
      }
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        lightbox.style.display = 'none';
      }
    });
  </script>
</body>
</html>
